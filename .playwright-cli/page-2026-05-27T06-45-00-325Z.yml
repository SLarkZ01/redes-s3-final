              - heading "Primera Línea de Defensa" [level=3] [ref=e120]
            - paragraph [ref=e121]: Actúan como la primera barrera contra ataques externos e internos, filtrando el tráfico malicioso antes de que llegue a los sistemas críticos.
          - generic [ref=e123]:
            - generic [ref=e124]:
              - img [ref=e126]
              - heading "Protección de Datos Sensibles" [level=3] [ref=e129]
            - paragraph [ref=e130]: Salvaguardan información personal, financiera y propiedad intelectual de accesos no autorizados y exfiltración.
          - generic [ref=e132]:
            - generic [ref=e133]:
              - img [ref=e135]
              - heading "Cumplimiento Normativo" [level=3] [ref=e139]
            - paragraph [ref=e140]: GDPR, PCI-DSS y HIPAA requieren controles de seguridad de red. Estos sistemas son esenciales para cumplir con regulaciones.
          - generic [ref=e142]:
            - generic [ref=e143]:
              - img [ref=e145]
              - heading "Prevención de Accesos No Autorizados" [level=3] [ref=e150]
            - paragraph [ref=e151]: Evitan intrusiones que pueden derivar en robo de datos, ransomware o espionaje industrial.
          - generic [ref=e153]:
            - generic [ref=e154]:
              - img [ref=e156]
              - heading "Reducción de Costos" [level=3] [ref=e158]
            - paragraph [ref=e159]: Un solo incidente de seguridad puede costar millones en pérdidas, sanciones legales y daño reputacional.
          - generic [ref=e161]:
