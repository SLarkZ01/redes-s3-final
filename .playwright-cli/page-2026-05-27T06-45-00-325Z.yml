        - generic [ref=e66]:
          - heading "Seguridad en Redes" [level=1] [ref=e67]
          - generic [ref=e68]: Firew
          - paragraph [ref=e70]: Firewalls, IDS e IPS — Protegiendo la infraestructura digital
      - generic [ref=e72]:
        - heading "1. Definición del Tema" [level=2] [ref=e73]
        - generic [ref=e74]:
          - generic [ref=e76]:
            - generic [ref=e77]:
              - img [ref=e79]
              - heading "Firewall" [level=3] [ref=e81]
            - paragraph [ref=e82]: Un firewall es un sistema de seguridad que monitorea y controla el tráfico de red entrante y saliente basándose en reglas de seguridad predefinidas. Actúa como una barrera entre una red interna confiable y redes externas no confiables (como Internet). Los firewalls pueden ser de hardware, software o una combinación de ambos.
          - generic [ref=e84]:
            - generic [ref=e85]:
              - img [ref=e87]
              - heading "IDS (Intrusion Detection System)" [level=3] [ref=e90]
            - paragraph [ref=e91]: "Un Sistema de Detección de Intrusiones monitorea el tráfico de red en busca de actividad sospechosa y emite alertas cuando se detecta. El IDS es un sistema pasivo: detecta y notifica, pero no bloquea el tráfico por sí mismo. Se ubica fuera de banda (out-of-band), es decir, recibe una copia del tráfico."
          - generic [ref=e93]:
            - generic [ref=e94]:
              - img [ref=e96]
              - heading "IPS (Intrusion Prevention System)" [level=3] [ref=e98]
            - paragraph [ref=e99]: "Un Sistema de Prevención de Intrusiones realiza las mismas funciones de detección que un IDS, pero con una capacidad adicional crítica: puede bloquear o prevenir automáticamente las amenazas detectadas. El IPS se ubica en línea (in-line), directamente en el camino del tráfico, lo que le permite tomar acciones en tiempo real como descartar paquetes maliciosos o bloquear direcciones IP."
      - generic [ref=e101]:
        - heading "2. Importancia en las Redes de Computadores" [level=2] [ref=e102]
        - generic [ref=e105]:
          - img [ref=e107]
          - generic [ref=e109]:
            - paragraph [ref=e110]: Según IBM, el costo promedio de una brecha de seguridad en 2023 fue de $4.45 millones de dólares.
            - paragraph [ref=e111]: — IBM Cost of a Data Breach Report 2023
        - generic [ref=e112]:
