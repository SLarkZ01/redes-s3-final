      - generic [ref=e250]:
        - heading "4. Funcionamiento Paso a Paso" [level=2] [ref=e251]
        - generic [ref=e254]:
          - generic [ref=e255]:
            - generic:
              - generic: "1"
            - generic [ref=e256]:
              - heading "Llegada del paquete" [level=4] [ref=e257]
              - paragraph [ref=e258]: Un paquete de datos llega a la interfaz de red del firewall o IPS. El sistema captura el paquete completo incluyendo encabezados y carga útil (payload).
          - generic [ref=e259]:
            - generic:
              - generic: "2"
            - generic [ref=e260]:
              - heading "Inspección de encabezados" [level=4] [ref=e261]
              - paragraph [ref=e262]: "El firewall examina los encabezados del paquete: dirección IP de origen y destino, puertos TCP/UDP, tipo de protocolo, y en firewalls stateful, el estado de la conexión en la tabla de sesiones."
          - generic [ref=e263]:
            - generic:
              - generic: "3"
            - generic [ref=e264]:
              - heading "Comparación contra reglas" [level=4] [ref=e265]
              - paragraph [ref=e266]: El paquete se compara secuencialmente contra el conjunto de reglas configuradas (ACL — Access Control List). Las reglas definen qué tráfico está PERMITIDO o DENEGADO según criterios como IP, puerto, protocolo, horario, etc. La primera regla que coincida determina la acción.
          - generic [ref=e267]:
            - generic:
              - generic: "4"
            - generic [ref=e268]:
              - heading "Detección de amenazas (IDS/IPS)" [level=4] [ref=e269]
              - paragraph [ref=e270]: Si el sistema incluye capacidades IDS/IPS, el contenido del paquete se compara contra la base de datos de firmas de ataques. Se analizan patrones como intentos de inyección SQL, escaneo de puertos, exploits conocidos, tráfico de malware, etc. En sistemas basados en anomalías, se compara contra el perfil de comportamiento normal.
          - generic [ref=e271]:
            - generic:
              - generic: "5"
            - generic [ref=e272]:
              - heading "Decisión y acción" [level=4] [ref=e273]
              - paragraph [ref=e274]: "Firewall sin IPS: PERMITIR (forward) o DENEGAR (drop) el paquete y registrarlo en el log. Modo IDS: Generar una alerta si se detecta amenaza. Modo IPS: Si se detecta amenaza, bloquear activamente (drop), resetear la conexión TCP (RST), o bloquear temporalmente la IP de origen."
          - generic [ref=e275]:
            - generic:
              - generic: "6"
            - generic [ref=e276]:
              - heading "Registro y monitoreo" [level=4] [ref=e277]
              - paragraph [ref=e278]: Toda la actividad se registra en logs para auditoría, análisis forense y cumplimiento normativo. Los logs se envían típicamente a un sistema SIEM (Security Information and Event Management) para correlación centralizada. Los administradores revisan alertas y ajustan reglas según sea necesario.
